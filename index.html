<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Will You Be My Valentine? 💝</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="app.js" defer></script>
</head>

<body>
  <div id="bg"></div>

  <main class="card" id="app">
    <h1 id="title">Loading…</h1>
    <p id="subtitle" class="muted"></p>

    <div id="stage" class="stage"></div>
    <div id="controls" class="controls"></div>
  </main>

  <!-- Hidden background music -->
  <audio id="bgm" loop preload="auto" playsinline>
    <source src="audio.mp3" type="audio/mpeg" />
  </audio>

  <!-- Tap-to-play overlay (shows only if autoplay is blocked) -->
  <div id="musicGate" class="musicGate hidden">
    <div class="gate-content">
      <div class="heart-beat">💖</div>
      <h2>A special message for you</h2>
      <button id="musicGateBtn" class="btn primary-btn">Tap to open</button>
    </div>
  </div>

  <script>
    const bgm = document.getElementById("bgm");
    const gate = document.getElementById("musicGate");
    const gateBtn = document.getElementById("musicGateBtn");

    async function startMusic() {
      try {
        bgm.volume = 0.6;
        await bgm.play();
        gate.classList.add("fade-out");
        setTimeout(() => gate.classList.add("hidden"), 500);
      } catch (e) {
        gate.classList.remove("hidden");
        console.warn("Music blocked or failed:", e);
      }
    }

    gateBtn.addEventListener("click", startMusic);
    window.addEventListener("pointerdown", startMusic, { once: true });
    window.addEventListener("touchstart", startMusic, { once: true });
    window.addEventListener("keydown", startMusic, { once: true });
  </script>
</body>
</html>
